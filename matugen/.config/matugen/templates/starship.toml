format = """
[](fg:{{colors.primary.default.hex}})\
$os\
$username\
[](fg:{{colors.primary.default.hex}}) \
[](fg:{{colors.tertiary.default.hex}})\
$directory\
[](fg:{{colors.tertiary.default.hex}})\
 $git_branch\
$git_status\
$python\
$nodejs\
$rust\
$golang\
$lua\
$cmd_duration\
$status\
$fill\
[](fg:{{colors.surface_variant.default.hex}})\
$memory_usage\
[](fg:{{colors.surface_variant.default.hex}})[](fg:{{colors.outline.default.hex}})\
$time\
[](fg:{{colors.outline.default.hex}})\
\n$character"""

add_newline = true

# ── Left side ────────────────────────────────

[os]
disabled = false
style = "bg:{{colors.primary.default.hex}} fg:{{colors.on_primary.default.hex}}"
format = "[ $symbol ]($style)"

[os.symbols]
Arch = "󰣇"
Linux = ""

[username]
show_always = true
style_user = "bg:{{colors.primary.default.hex}} fg:{{colors.on_primary.default.hex}} bold"
style_root = "bg:{{colors.error.default.hex}} fg:{{colors.on_error.default.hex}} bold"
format = "[$user ]($style)"

[directory]
style = "bg:{{colors.tertiary.default.hex}} fg:{{colors.on_tertiary.default.hex}} bold"
format = "[ $path ]($style)"
truncation_length = 3
truncate_to_repo = false
read_only = " 󰌾"
read_only_style = "bg:{{colors.tertiary.default.hex}} fg:{{colors.error.default.hex}}"

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music" = "󰎆 "
"Pictures" = " "
"Videos" = "󰕧 "
"Projects" = "󰲋 "
".config" = " "

[git_branch]
symbol = ""
style = "fg:{{colors.tertiary.default.hex}} bold"
format = "[  $symbol $branch ]($style)"

[git_status]
style = "fg:{{colors.tertiary.default.hex}}"
format = "[$all_status$ahead_behind]($style)"
conflicted = "󰘬 "
ahead = "󰁝${count} "
behind = "󰁅${count} "
diverged = "󰃻 ${ahead_count}/${behind_count} "
untracked = "󰋗${count} "
stashed = "󰏗 "
modified = "󰏫${count} "
staged = "󰐕${count} "
renamed = "󰑕 "
deleted = "󰍷${count} "

[python]
symbol = ""
style = "fg:{{colors.secondary.default.hex}} bold"
format = '[ $symbol $version( \($virtualenv\)) ]($style)'
detect_extensions = ["py"]
detect_files = ["requirements.txt", "pyproject.toml", "setup.py", ".python-version"]
detect_folders = ["venv", ".venv"]
detect_env_vars = ["VIRTUAL_ENV"]

[nodejs]
symbol = ""
style = "fg:{{colors.secondary.default.hex}} bold"
format = "[ $symbol $version ]($style)"
detect_extensions = ["js", "ts", "mjs"]
detect_files = ["package.json", ".node-version"]

[rust]
symbol = "󱘗"
style = "fg:{{colors.secondary.default.hex}} bold"
format = "[ $symbol $version ]($style)"

[golang]
symbol = "󰟓"
style = "fg:{{colors.secondary.default.hex}} bold"
format = "[ $symbol $version ]($style)"

[lua]
symbol = "󰢱"
style = "fg:{{colors.secondary.default.hex}} bold"
format = "[ $symbol $version ]($style)"

[cmd_duration]
min_time = 500
style = "fg:{{colors.error.default.hex}} bold"
format = "[ 󰔟 $duration ]($style)"
show_milliseconds = false

[status]
disabled = false
style = "fg:{{colors.error.default.hex}} bold"
format = "[ 󰅙 $status ]($style)"
symbol = "󰅙 "
success_symbol = ""
not_executable_symbol = "󰂭 "
not_found_symbol = "󰍉 "
sigint_symbol = "󰓛 "
map_symbol = true

# ── Fill ─────────────────────────────────────

[fill]
symbol = " "

# ── Right side ───────────────────────────────

[memory_usage]
disabled = false
threshold = 0
style = "bg:{{colors.surface_variant.default.hex}} fg:{{colors.on_surface_variant.default.hex}}"
format = "[ 󰍛 $ram_pct ]($style)"

[time]
disabled = false
style = "bg:{{colors.outline.default.hex}} fg:{{colors.surface.default.hex}}"
format = "[ 󰥔 $time ]($style)"
time_format = "%H:%M"

# ── Input symbol ─────────────────────────────

[character]
success_symbol = "[❯](bold {{colors.tertiary.default.hex}})"
error_symbol = "[❯](bold {{colors.error.default.hex}})"
vimcmd_symbol = "[❮](bold {{colors.primary.default.hex}})"
